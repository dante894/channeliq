<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visitantes — ChannelIQ Admin</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/favicon.svg') }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='img/favicon-32.png') }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='img/favicon-16.png') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/apple-touch-icon.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <style>
    .admin-layout { padding: 2rem 1.5rem 4rem; }
    .admin-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem; }
    .admin-header h1 { font-family: var(--font-display); font-size: 1.8rem; }
    .range-tabs { display: flex; gap: 0.4rem; }
    .range-tab { font-family: var(--font-mono); font-size: 0.75rem; padding: 0.4rem 0.85rem; border-radius: 20px; border: 1px solid var(--line); color: var(--text-dim); background: transparent; cursor: pointer; }
    .range-tab.active { border-color: var(--accent); color: var(--accent); }

    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--line); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; margin-bottom: 1.5rem; }
    .stat-card { background: var(--surface); padding: 1.25rem; }
    .stat-label { font-family: var(--font-mono); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); margin-bottom: 0.4rem; }
    .stat-value { font-family: var(--font-display); font-size: 2rem; font-weight: 700; color: var(--accent); }

    .panel { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; margin-bottom: 1.5rem; }
    .panel-head { display: flex; align-items: center; justify-content: space-between; padding: 0.8rem 1.25rem; border-bottom: 1px solid var(--line); font-family: var(--font-mono); font-size: 0.72rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; }
    .panel-body { padding: 1.25rem; }
    .chart-wrap { height: 220px; padding: 1.25rem; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 860px) { .two-col { grid-template-columns: 1fr; } .stats-row { grid-template-columns: 1fr; } }

    .bar-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .bar-row { display: grid; grid-template-columns: 140px 1fr 56px; align-items: center; gap: 0.6rem; }
    .bar-name { font-size: 0.8rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bar-bg { background: var(--surface-raised); border-radius: 20px; height: 8px; overflow: hidden; }
    .bar-fill { background: var(--accent); height: 100%; border-radius: 20px; }
    .bar-n { font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-dim); text-align: right; }

    .device-row { display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid var(--line); }
    .device-row:last-child { border-bottom: none; }
    .device-name { font-size: 0.85rem; text-transform: capitalize; }
    .device-n { font-family: var(--font-mono); color: var(--accent); font-weight: 700; }

    .visits-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    .visits-table th { padding: 0.6rem 1.25rem; text-align: left; font-family: var(--font-mono); font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); border-bottom: 1px solid var(--line); background: var(--surface-raised); position: sticky; top: 0; }
    .visits-table td { padding: 0.55rem 1.25rem; border-bottom: 1px solid var(--line); color: var(--text-dim); }
    .visits-table td.path { color: var(--text); }
    .visits-table tr:hover td { background: var(--surface-raised); }
    .visits-scroll { max-height: 420px; overflow-y: auto; }
    .empty-note { color: var(--text-dim); font-size: 0.85rem; padding: 0.5rem 0; }
  </style>
</head>
<body>

<header class="topbar">
  <div class="shell topbar-inner">
    <a href="/" class="brand"><img src="{{ url_for('static', filename='img/logo-mark.svg') }}" class="brand-mark" alt="ChannelIQ">ChannelIQ</a>
    <nav class="nav-links">
      <span style="color:var(--accent);font-family:var(--font-mono);font-size:0.8rem;">ADMIN</span>
      <a href="{{ url_for('admin.dashboard') }}" class="btn btn-ghost">← Panel admin</a>
      <a href="{{ url_for('auth.logout') }}" class="btn btn-ghost">Salir</a>
    </nav>
  </div>
</header>

<main class="shell admin-layout">
  <div class="admin-header">
    <h1>👥 Visitantes del sitio</h1>
    <div class="range-tabs" id="range-tabs">
      <button class="range-tab" data-days="7">7 días</button>
      <button class="range-tab active" data-days="30">30 días</button>
      <button class="range-tab" data-days="90">90 días</button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Vistas totales</div>
      <div class="stat-value" id="stat-total">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Visitantes únicos</div>
      <div class="stat-value" id="stat-unique">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Vistas hoy</div>
      <div class="stat-value" id="stat-today">—</div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-head"><span>vistas_por_día</span></div>
    <div class="chart-wrap"><canvas id="timeline-chart"></canvas></div>
  </div>

  <div class="two-col">
    <div class="panel">
      <div class="panel-head"><span>páginas_más_visitadas</span></div>
      <div class="panel-body"><div class="bar-list" id="top-pages"><p class="empty-note">Cargando…</p></div></div>
    </div>
    <div class="panel">
      <div class="panel-head"><span>fuentes_de_tráfico</span></div>
      <div class="panel-body"><div class="bar-list" id="top-referrers"><p class="empty-note">Cargando…</p></div></div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-head"><span>dispositivos</span></div>
    <div class="panel-body" id="devices-list"><p class="empty-note">Cargando…</p></div>
  </div>

  <div class="panel">
    <div class="panel-head">
      <span>últimas_visitas</span>
      <span style="color:var(--text-dim)">máx. 100</span>
    </div>
    <div class="visits-scroll">
      <table class="visits-table">
        <thead>
          <tr>
            <th>Página</th>
            <th>Origen</th>
            <th>Dispositivo</th>
            <th>Usuario</th>
            <th>IP</th>
            <th>Fecha</th>
          </tr>
        </thead>
        <tbody id="recent-visits">
          <tr><td colspan="6" class="empty-note">Cargando…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
(function () {
  let timelineChart = null;
  let currentDays = 30;

  function fmt(n) {
    if (n == null) return "—";
    if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + "M";
    if (n >= 1_000) return (n / 1_000).toFixed(1) + "K";
    return n.toLocaleString("es");
  }
  function esc(s) {
    const d = document.createElement("div");
    d.textContent = s || "";
    return d.innerHTML;
  }

  async function load(days) {
    currentDays = days;
    const res = await fetch(`/admin/api/visitors-stats?days=${days}`);
    const data = await res.json();
    if (!res.ok) { console.error(data.error); return; }

    document.getElementById("stat-total").textContent = fmt(data.total_views);
    document.getElementById("stat-unique").textContent = fmt(data.unique_visitors);
    document.getElementById("stat-today").textContent = fmt(data.views_today);

    renderTimeline(data.timeline);
    renderBars("top-pages", data.top_pages.map(p => ({ name: p.path, n: p.n })));
    renderBars("top-referrers", data.top_referrers.map(r => ({ name: r.source, n: r.n })));
    renderDevices(data.devices);
    renderRecent(data.recent);
  }

  function renderTimeline(timeline) {
    const labels = timeline.map(d => {
      const dt = new Date(d.date);
      return dt.toLocaleDateString("es", { month: "short", day: "numeric" });
    });
    if (timelineChart) timelineChart.destroy();
    timelineChart = new Chart(document.getElementById("timeline-chart"), {
      type: "line",
      data: {
        labels,
        datasets: [
          { label: "Vistas", data: timeline.map(d => d.views), borderColor: "#4F8EF7", backgroundColor: "rgba(79,142,247,0.08)", borderWidth: 2, pointRadius: 0, tension: 0.25, fill: true },
          { label: "Únicos", data: timeline.map(d => d.uniques), borderColor: "#34D399", backgroundColor: "rgba(52,211,153,0.06)", borderWidth: 2, pointRadius: 0, tension: 0.25, fill: true },
        ],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: "#6B7FA3", font: { family: "JetBrains Mono", size: 10.5 } } } },
        scales: {
          x: { grid: { color: "#1F2D45" }, ticks: { color: "#6B7FA3", font: { family: "JetBrains Mono", size: 10 }, maxTicksLimit: 12 } },
          y: { beginAtZero: true, grid: { color: "#1F2D45" }, ticks: { color: "#6B7FA3", font: { family: "JetBrains Mono", size: 10 } } },
        },
      },
    });
  }

  function renderBars(elId, items) {
    const el = document.getElementById(elId);
    if (!items || items.length === 0) {
      el.innerHTML = '<p class="empty-note">Sin datos en este período.</p>';
      return;
    }
    const max = Math.max(...items.map(i => i.n)) || 1;
    el.innerHTML = items.map(i => `
      <div class="bar-row">
        <div class="bar-name" title="${esc(i.name)}">${esc(i.name)}</div>
        <div class="bar-bg"><div class="bar-fill" style="width:${(i.n / max) * 100}%"></div></div>
        <div class="bar-n">${fmt(i.n)}</div>
      </div>
    `).join("");
  }

  function renderDevices(devices) {
    const el = document.getElementById("devices-list");
    if (!devices || devices.length === 0) {
      el.innerHTML = '<p class="empty-note">Sin datos en este período.</p>';
      return;
    }
    const total = devices.reduce((s, d) => s + d.n, 0) || 1;
    el.innerHTML = devices
      .sort((a, b) => b.n - a.n)
      .map(d => `
        <div class="device-row">
          <span class="device-name">${esc(d.device)}</span>
          <span><span class="device-n">${fmt(d.n)}</span> <span style="color:var(--text-dim);font-size:0.78rem;">(${Math.round(d.n / total * 100)}%)</span></span>
        </div>
      `).join("");
  }

  function renderRecent(recent) {
    const el = document.getElementById("recent-visits");
    if (!recent || recent.length === 0) {
      el.innerHTML = '<tr><td colspan="6" class="empty-note">Sin visitas registradas todavía.</td></tr>';
      return;
    }
    el.innerHTML = recent.map(v => {
      const dt = new Date(v.created_at);
      return `
        <tr>
          <td class="path">${esc(v.path)}</td>
          <td>${esc(v.referrer_host || "Directo")}</td>
          <td>${esc(v.device || "—")}</td>
          <td>${esc(v.user_email || "—")}</td>
          <td>${esc(v.ip_address || "—")}</td>
          <td>${dt.toLocaleString("es", { day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit" })}</td>
        </tr>
      `;
    }).join("");
  }

  document.querySelectorAll(".range-tab").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".range-tab").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      load(parseInt(btn.dataset.days, 10));
    });
  });

  load(currentDays);
})();
</script>
</body>
</html>
